services:
  - type: web
    name: options-intelligence-api
    env: python
    region: singapore   # closest to India
    plan: starter       # $7/month — has persistent disk
    buildCommand: pip install -r requirements_deploy.txt
    startCommand: uvicorn render_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER
        value: "true"
      - key: NUBRA_ENV
        value: production
      - key: NUBRA_PHONE
        sync: false   # set in Render dashboard
      - key: MPIN
        sync: false   # set in Render dashboard
      - key: PHONE_NO
        sync: false
      - key: DB_PATH
        value: /data/data.db
      - key: MODELS_DIR
        value: /data/trained_models
      - key: OMP_NUM_THREADS
        value: "1"
      - key: NETLIFY_URL
        sync: false   # set to your Netlify URL
    disk:
      name: options-data
      mountPath: /data
      sizeGB: 1
