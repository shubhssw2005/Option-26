services:
  - type: web
    name: options-intelligence-api
    env: python
    region: singapore
    plan: free
    pythonVersion: "3.11" # pin Python 3.11 — best compatibility
    buildCommand: bash build_render.sh
    startCommand: uvicorn render_server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: RENDER
        value: "true"
      - key: NUBRA_ENV
        value: production
      - key: NUBRA_PHONE
        sync: false
      - key: MPIN
        sync: false
      - key: PHONE_NO
        sync: false
      - key: NUBRA_TOTP_SECRET
        sync: false
      - key: NUBRA_SESSION_TOKEN
        sync: false
      - key: NUBRA_DEVICE_ID
        sync: false
      - key: DB_PATH
        value: /tmp/data.db # tmp — resets on restart, reloaded from API
      - key: MODELS_DIR
        value: /tmp/trained_models
      - key: OMP_NUM_THREADS
        value: "1"
      - key: NETLIFY_URL
        sync: false
      - key: GITHUB_REPO
        sync: false # e.g. shubhamsw2005/options-intelligence
